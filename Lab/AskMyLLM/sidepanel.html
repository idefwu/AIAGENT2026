<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="marked.min.js"></script>

  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      padding: 10px; 
      display: flex; 
      flex-direction: column; 
      height: 96vh; 
      margin: 0;
      background-color: #f9f9f9;
    }

    .config-section { 
      font-size: 12px; 
      background: #ffffff; 
      padding: 10px; 
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-bottom: 10px; 
    }

    details summary {
      cursor: pointer;
      color: #555;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    input, textarea { 
      width: 100%; 
      margin-bottom: 8px; 
      padding: 6px; 
      border: 1px solid #ddd; 
      border-radius: 4px;
      box-sizing: border-box;
    }

    #chat { 
      flex-grow: 1; 
      overflow-y: auto; 
      background: white;
      border: 1px solid #eee; 
      border-radius: 8px;
      margin-bottom: 10px; 
      padding: 10px; 
    }

    .msg {
      margin-bottom: 16px;
      border-bottom: 1px solid #f1f1f1;
      padding-bottom: 8px;
    }

    .msg-user {
      color: #007bff;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .msg-ai {
      color: #333;
      line-height: 1.6;
    }

    .msg-ai p {
      margin: 8px 0;
    }

    .msg-ai ul,
    .msg-ai ol {
      padding-left: 20px;
      margin: 8px 0;
    }

    .msg-ai h1,
    .msg-ai h2,
    .msg-ai h3 {
      font-size: 1.1em;
      margin: 12px 0 6px 0;
      border-left: 3px solid #28a745;
      padding-left: 8px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
    }

    button {
      cursor: pointer;
      background: #007bff;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      transition: background 0.2s;
    }

    button:hover {
      background: #0056b3;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #saveConfig {
      width: 100%;
      background: #6c757d;
    }

    #clearBtn {
      background: #dc3545;
      flex: 0 0 auto;
    }

    #clearBtn:hover {
      background: #c82333;
    }

    #sendBtn {
      flex-grow: 1;
    }

    /* ===== Loading Animation ===== */

    .loading-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #666;
      font-style: italic;
      padding: 8px 0;
    }

    .loading-dots {
      display: flex;
      gap: 4px;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      background: #007bff;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0.6);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

  </style>
</head>

<body>

  <div class="config-section">
    <details>
      <summary>⚙️ API 設定</summary>

      <input id="apiUrl" placeholder="Open WebUI URL (例如 http://127.0.0.1:8080)" />
      <input id="apiKey" type="password" placeholder="API Key" />
      <input id="model" placeholder="模型名稱" />

      <textarea id="sysPrompt" rows="2" placeholder="System Prompt"></textarea>

      <textarea id="usrPrompt" rows="2" placeholder="User Prompt"></textarea>

      <button id="saveConfig">儲存設定</button>
    </details>
  </div>

  <div id="chat">
    <div style="color: #888; font-size: 13px; text-align: center;">
      請輸入問題來分析當前網頁
    </div>
  </div>

  <textarea id="userInput" rows="3" placeholder="對此網頁提問..."></textarea>

  <div class="btn-group">
    <button id="sendBtn">發送問題</button>
    <button id="exeBtn" style="background: #FF6D00;">私任務</button>
    <button id="summarizeBtn" style="background: #28a745;">抓重點</button>
    <button id="clearBtn">清除</button>
  </div>

  <script src="sidepanel.js"></script>

</body>
</html>
